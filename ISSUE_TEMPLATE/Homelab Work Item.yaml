name: Homelab Work Item
description: Planned infrastructure, automation, repo, or ops work
title: "[area] short description"
labels:
  - needs-triage
body:
  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - Feature / enhancement
        - Bug / regression
        - Maintenance
        - Documentation
        - Investigation
        - Incident follow-up
        - Security / access
  - type: input
    id: area
    attributes:
      label: Area
      description: repo, service, host, workflow, or subsystem
      placeholder: SSH CA, Renovate, app-prod, Docker, Ansible
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to happen?
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired outcome
      description: What should be true when this is done?
  - type: textarea
    id: scope
    attributes:
      label: Scope / boundaries
      description: What is explicitly in or out?
  - type: textarea
    id: risk
    attributes:
      label: Risk / production impact
      description: Hosts, services, secrets, network, deploy impact, approval needs
  - type: textarea
    id: implementation
    attributes:
      label: Implementation notes
      description: Known approach, files, commands, references, constraints
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Tests, lint, compose config, Ansible checks, smoke checks
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checklist for closing the issue
  - type: textarea
    id: rollback
    attributes:
      label: Rollback / recovery notes
      description: Only needed for risky or deployed changes
